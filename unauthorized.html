<!doctype html>
<html lang="en" data-jjc-skip-public-config>
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Unauthorized Access | JJConnect</title>
  <style>
    :root {
      --bg: #f4f7fb;
      --card: #fff;
      --text: #1a202c;
      --muted: #64748b;
      --primary: #2b6cb0;
      --border: #e2e8f0;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; background: var(--bg); color: var(--text); display: flex; align-items: center; justify-content: center; min-height: 100vh; }
    .card { background: var(--card); border: 1px solid var(--border); border-radius: 12px; padding: 32px; max-width: 400px; width: 100%; text-align: center; box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1), 0 2px 4px -1px rgba(0, 0, 0, 0.06); }
    h1 { font-size: 24px; margin-bottom: 12px; color: #dc2626; }
    p { color: var(--muted); margin-bottom: 24px; font-size: 15px; line-height: 1.5; }
    .btn { display: inline-block; border: 0; border-radius: 8px; padding: 10px 20px; cursor: pointer; background: var(--primary); color: #fff; font-size: 14px; text-decoration: none; font-weight: 500; transition: background 0.2s; }
    .btn:hover { background: #1e4e8c; }
  </style>
</head>
<body>
  <div class="card">
    <h1>未授权访问</h1>
    <p>抱歉，您当前的账户没有权限访问该页面。请联系管理员申请对应权限。</p>
    <a href="index.html" class="btn">返回首页</a>
  </div>
</body>
</html>
