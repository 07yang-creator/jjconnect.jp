<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>We're Getting Ready - JJConnect</title>
  <link rel="stylesheet" href="navbar.css">
  <link rel="icon" href="wp-content/uploads/2025/08/cropped-cropped-logo-icon-1.png">
  
  <!-- Tailwind CSS -->
  <script src="https://cdn.tailwindcss.com"></script>
  
  <style>
    :root {
      --space-dark: #0f0c29;
      --space-mid: #302b63;
      --space-light: #24243e;
      --countdown-bg: rgba(255, 255, 255, 0.15);
      --btn-blue: #2563eb;
    }
    
    body {
      min-height: 100vh;
      background: linear-gradient(135deg, #0f0c29 0%, #302b63 50%, #24243e 100%);
      position: relative;
      overflow-x: hidden;
    }
    
    /* Stars background */
    .stars {
      position: fixed;
      inset: 0;
      pointer-events: none;
      overflow: hidden;
    }
    .star {
      position: absolute;
      background: white;
      border-radius: 50%;
      animation: twinkle 2s ease-in-out infinite;
    }
    .star:nth-child(odd) { animation-delay: 0.5s; }
    .star:nth-child(3n) { animation-delay: 1s; }
    .star:nth-child(5n) { animation-delay: 1.5s; }
    @keyframes twinkle {
      0%, 100% { opacity: 0.3; }
      50% { opacity: 1; }
    }
    
    /* Main content - centered */
    .gettingready-main {
      min-height: calc(100vh - 80px);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      text-align: center;
      padding: 2rem 1.5rem;
      position: relative;
      z-index: 1;
    }
    
    .gettingready-title {
      font-size: clamp(1.75rem, 4vw, 2.5rem);
      font-weight: 700;
      color: white;
      margin-bottom: 2rem;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
    }
    
    /* Countdown box */
    .countdown-box {
      background: var(--countdown-bg);
      backdrop-filter: blur(8px);
      border-radius: 12px;
      padding: 1.5rem 2rem;
      margin-bottom: 2rem;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 0.5rem;
      flex-wrap: wrap;
    }
    
    .countdown-unit {
      display: flex;
      flex-direction: column;
      align-items: center;
      min-width: 60px;
    }
    
    .countdown-number {
      font-size: clamp(1.5rem, 4vw, 2.5rem);
      font-weight: 700;
      color: white;
      line-height: 1.2;
    }
    
    .countdown-label {
      font-size: 0.75rem;
      color: rgba(255, 255, 255, 0.9);
      text-transform: capitalize;
    }
    
    .countdown-separator {
      font-size: 1.5rem;
      font-weight: 700;
      color: white;
      margin: 0 0.25rem;
      padding-bottom: 1.25rem;
    }
    
    .gettingready-text {
      color: rgba(255, 255, 255, 0.95);
      font-size: 0.95rem;
      line-height: 1.6;
      margin-bottom: 1.5rem;
      max-width: 420px;
    }
    
    /* Newsletter form */
    .newsletter-form {
      display: flex;
      gap: 0.5rem;
      flex-wrap: wrap;
      justify-content: center;
      max-width: 420px;
    }
    
    .newsletter-input {
      flex: 1;
      min-width: 200px;
      padding: 0.75rem 1rem;
      border-radius: 8px;
      border: none;
      background: rgba(255, 255, 255, 0.9);
      color: #1a1a2e;
      font-size: 0.95rem;
    }
    
    .newsletter-input::placeholder {
      color: #718096;
    }
    
    .newsletter-btn {
      padding: 0.75rem 1.25rem;
      border-radius: 8px;
      border: none;
      background: var(--btn-blue);
      color: white;
      cursor: pointer;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      transition: opacity 0.2s;
    }
    
    .newsletter-btn:hover {
      opacity: 0.9;
    }
    
    .newsletter-btn svg {
      width: 20px;
      height: 20px;
    }
    
    @media (max-width: 640px) {
      .newsletter-form {
        flex-direction: column;
      }
      .newsletter-input {
        min-width: 100%;
      }
    }
  </style>
</head>
<body>
  <script src="navbar.js"></script>

  <!-- Stars decoration -->
  <div class="stars" id="stars"></div>

  <div class="gettingready-main">
    <h1 class="gettingready-title">We're Getting Ready</h1>
    
    <div class="countdown-box">
      <div class="countdown-unit">
        <span class="countdown-number" id="days">0</span>
        <span class="countdown-label">Days</span>
      </div>
      <span class="countdown-separator">:</span>
      <div class="countdown-unit">
        <span class="countdown-number" id="hours">0</span>
        <span class="countdown-label">Hours</span>
      </div>
      <span class="countdown-separator">:</span>
      <div class="countdown-unit">
        <span class="countdown-number" id="minutes">0</span>
        <span class="countdown-label">Minutes</span>
      </div>
      <span class="countdown-separator">:</span>
      <div class="countdown-unit">
        <span class="countdown-number" id="seconds">0</span>
        <span class="countdown-label">Seconds</span>
      </div>
    </div>
    
    <p class="gettingready-text">
      We will back to something amazing<br>
      to get latest updates about our site please sign up to our newsletter
    </p>
    
    <form class="newsletter-form" id="newsletter-form" onsubmit="return false;">
      <input type="email" class="newsletter-input" placeholder="Enter email and get updates" required>
      <button type="submit" class="newsletter-btn" aria-label="Subscribe">
        <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
          <path stroke-linecap="round" stroke-linejoin="round" d="M14 5l7 7m0 0l-7 7m7-7H3" />
        </svg>
      </button>
    </form>
  </div>

  <script>
    // 2026年3月31日24:00 JST = 2026-04-01 00:00 JST
    const endDate = new Date('2026-04-01T00:00:00+09:00');
    
    function updateCountdown() {
      const now = new Date();
      const diff = endDate - now;
      
      if (diff <= 0) {
        document.getElementById('days').textContent = '0';
        document.getElementById('hours').textContent = '00';
        document.getElementById('minutes').textContent = '00';
        document.getElementById('seconds').textContent = '00';
        return;
      }
      
      const days = Math.floor(diff / (1000 * 60 * 60 * 24));
      const hours = Math.floor((diff % (1000 * 60 * 60 * 24)) / (1000 * 60 * 60));
      const minutes = Math.floor((diff % (1000 * 60 * 60)) / (1000 * 60));
      const seconds = Math.floor((diff % (1000 * 60)) / 1000);
      
      document.getElementById('days').textContent = days;
      document.getElementById('hours').textContent = String(hours).padStart(2, '0');
      document.getElementById('minutes').textContent = String(minutes).padStart(2, '0');
      document.getElementById('seconds').textContent = String(seconds).padStart(2, '0');
    }
    
    // Generate stars
    function createStars() {
      const container = document.getElementById('stars');
      for (let i = 0; i < 80; i++) {
        const star = document.createElement('div');
        star.className = 'star';
        star.style.width = star.style.height = (Math.random() * 2 + 1) + 'px';
        star.style.left = Math.random() * 100 + '%';
        star.style.top = Math.random() * 100 + '%';
        container.appendChild(star);
      }
    }
    
    createStars();
    updateCountdown();
    setInterval(updateCountdown, 1000);
  </script>
</body>
</html>
